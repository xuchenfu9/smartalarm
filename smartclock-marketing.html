    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fb;
            --surface: rgba(255, 255, 255, 0.92);
            --surface-strong: #ffffff;
            --text: #172033;
            --muted: #5f6b85;
            --line: rgba(23, 32, 51, 0.08);
            --blue: #2563eb;
            --blue-soft: rgba(37, 99, 235, 0.10);
            --green: #059669;
            --green-soft: rgba(5, 150, 105, 0.10);
            --orange: #ea580c;
            --orange-soft: rgba(234, 88, 12, 0.10);
            --purple: #7c3aed;
            --purple-soft: rgba(124, 58, 237, 0.10);
            --shadow: 0 24px 50px rgba(17, 24, 39, 0.10);
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --max: 1120px;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 28%),
                radial-gradient(circle at top right, rgba(124, 58, 237, 0.14), transparent 24%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 56%, #eef2ff 100%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.65;
        }

        a {
            color: var(--blue);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .page {
            width: min(var(--max), calc(100vw - 32px));
            margin: 0 auto;
            padding: 28px 0 56px;
        }

        .language-bar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
            padding: 12px 0 18px;
            backdrop-filter: blur(16px);
        }

        .language-button {
            border: 1px solid var(--line);
            background: rgba(255,255,255,0.86);
            color: var(--muted);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s ease;
        }

        .language-button:hover,
        .language-button.active {
            background: var(--text);
            border-color: var(--text);
            color: white;
        }

        .hero {
            background: linear-gradient(135deg, rgba(255,255,255,0.96), rgba(248,250,255,0.90));
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: var(--shadow);
            border-radius: var(--radius-xl);
            padding: 34px;
            display: grid;
            gap: 28px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--blue);
            background: var(--blue-soft);
        }

        .hero-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.9fr);
            gap: 26px;
            align-items: stretch;
        }

        h1 {
            margin: 14px 0 14px;
            font-size: clamp(34px, 5vw, 58px);
            line-height: 1.05;
            letter-spacing: -0.03em;
        }

        .subtitle {
            font-size: clamp(18px, 2vw, 21px);
            color: var(--muted);
            max-width: 760px;
            margin-bottom: 22px;
        }

        .hero-points {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .point-card,
        .section-card,
        .quick-check,
        .feature-card,
        .audience-card,
        .footer-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            box-shadow: 0 14px 34px rgba(17, 24, 39, 0.05);
        }

        .point-card {
            padding: 16px;
        }

        .point-card strong {
            display: block;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .point-card span {
            display: block;
            color: var(--muted);
            font-size: 14px;
        }

        .quick-check {
            padding: 22px;
            background: linear-gradient(180deg, rgba(37, 99, 235, 0.08), rgba(255, 255, 255, 0.9));
        }

        .quick-check h2,
        .section-title {
            margin: 0 0 10px;
            font-size: 24px;
            letter-spacing: -0.02em;
        }

        .quick-check p,
        .section-intro,
        .feature-card p,
        .audience-card p,
        .footer-card p,
        .footer-card li {
            margin: 0;
            color: var(--muted);
        }

        .review-list {
            margin: 18px 0 0;
            padding: 0;
            list-style: none;
            display: grid;
            gap: 12px;
        }

        .review-list li {
            display: grid;
            grid-template-columns: 28px minmax(0, 1fr);
            gap: 12px;
            align-items: start;
        }

        .review-list .step {
            width: 28px;
            height: 28px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: white;
            background: var(--blue);
            margin-top: 2px;
        }

        .section {
            margin-top: 28px;
        }

        .section-card {
            padding: 28px;
        }

        .feature-grid,
        .audience-grid,
        .footer-grid {
            display: grid;
            gap: 16px;
        }

        .feature-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
            margin-top: 18px;
        }

        .feature-card {
            padding: 20px;
        }

        .feature-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .feature-tag.blue { color: var(--blue); background: var(--blue-soft); }
        .feature-tag.orange { color: var(--orange); background: var(--orange-soft); }
        .feature-tag.purple { color: var(--purple); background: var(--purple-soft); }
        .feature-tag.green { color: var(--green); background: var(--green-soft); }

        .feature-card h3,
        .audience-card h3,
        .footer-card h3 {
            margin: 0 0 8px;
            font-size: 18px;
            letter-spacing: -0.02em;
        }

        .audience-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            margin-top: 18px;
        }

        .audience-card,
        .footer-card {
            padding: 20px;
        }

        .footer-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
            margin-top: 18px;
        }

        .footer-card ul {
            margin: 10px 0 0;
            padding-left: 18px;
        }

        .support-note {
            margin-top: 18px;
            padding: 16px 18px;
            border-radius: var(--radius-md);
            background: rgba(15, 23, 42, 0.04);
            color: var(--muted);
            font-size: 14px;
        }

        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 13px;
            color: #334155;
            word-break: break-word;
        }

        @media (max-width: 920px) {
            .hero-grid,
            .feature-grid,
            .audience-grid,
            .footer-grid,
            .hero-points {
                grid-template-columns: 1fr;
            }

            .hero {
                padding: 24px;
            }

            .section-card {
                padding: 22px;
            }
        }

        @media (max-width: 560px) {
            .page {
                width: min(var(--max), calc(100vw - 20px));
                padding-top: 16px;
            }

            .language-bar {
                justify-content: flex-start;
                gap: 8px;
            }

            .language-button {
                font-size: 13px;
                padding: 8px 12px;
            }

            h1 {
                font-size: 34px;
            }
        }
    </style>
</head>

        const html = document.documentElement;
        const buttons = Array.from(document.querySelectorAll('.language-button'));
        const targets = Array.from(document.querySelectorAll('[data-i18n]'));

        function applyLanguage(lang) {
            const pack = translations[lang] || translations.en;
            html.lang = lang === 'zh' ? 'zh-CN' : lang;
            targets.forEach((el) => {
                const key = el.dataset.i18n;
                if (pack[key]) {
                    el.textContent = pack[key];
                }
            });
            buttons.forEach((button) => {
                button.classList.toggle('active', button.dataset.lang === lang);
            });
            try {
                localStorage.setItem('marketing-lang', lang);
            } catch (_) {}
        }

        buttons.forEach((button) => {
            button.addEventListener('click', () => applyLanguage(button.dataset.lang));
        });

        const stored = (() => {
            try {
                return localStorage.getItem('marketing-lang');
            } catch (_) {
                return null;
            }
        })();

        applyLanguage(stored && translations[stored] ? stored : 'en');
    </script>
